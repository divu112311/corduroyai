####################################################################
# Cloud Build – builds & deploys frontend + backend to Cloud Run
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=us-central1
#
# Or trigger automatically via a Cloud Build trigger connected to
# your repository.
####################################################################

substitutions:
  _REGION: us-central1

steps:
  # ---- Frontend ----
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/corduroy-frontend:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/corduroy-frontend:latest
      - -f
      - Dockerfile
      - .

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/corduroy-frontend
    waitFor: [build-frontend]

  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - corduroy-frontend
      - --image=gcr.io/$PROJECT_ID/corduroy-frontend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
    waitFor: [push-frontend]

  # ---- Backend (Python FastAPI) ----
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/corduroy-backend:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/corduroy-backend:latest
      - -f
      - backend/tradeai/Dockerfile
      - backend/tradeai

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/corduroy-backend
    waitFor: [build-backend]

  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - corduroy-backend
      - --image=gcr.io/$PROJECT_ID/corduroy-backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-secrets=SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,PINECONE_API_KEY=PINECONE_API_KEY:latest,PINECONE_HOST=PINECONE_HOST:latest
    waitFor: [push-backend]

images:
  - gcr.io/$PROJECT_ID/corduroy-frontend:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/corduroy-frontend:latest
  - gcr.io/$PROJECT_ID/corduroy-backend:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/corduroy-backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
